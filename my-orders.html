<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Plus Jakarta Sans", sans-serif;
      }
    </style>
    <script src="supabase-config.js"></script>
    <script src="auth.js" defer></script>
    <script src="my-orders-app.js" defer></script>
    <title>طلباتي - BeebBeeb</title>
  </head>
  <body class="bg-[#fff8f7] text-slate-900 min-h-screen">
    <header class="bg-white/90 border-b border-teal-100 sticky top-0 z-50">
      <div class="max-w-3xl mx-auto px-4 py-3 flex items-center justify-between">
        <a href="home.html" class="text-xl font-black text-teal-600">BeebBeeb</a>
        <nav class="flex gap-4 text-sm">
          <a class="text-teal-700 font-bold" href="my-orders.html">طلباتي</a>
          <a class="text-slate-600 hover:text-teal-600" href="tracking.html">تتبع الطلب</a>
          <a class="text-slate-600 hover:text-teal-600" href="checkout.html">السلة</a>
        </nav>
      </div>
    </header>
    <main class="max-w-3xl mx-auto px-4 py-8">
      <h1 class="text-2xl font-black mb-2">طلباتي</h1>
      <p class="text-slate-600 text-sm mb-6">الطلبات المسجلة بحسابك.</p>
      <div id="bb-my-orders-msg" class="text-sm text-red-600 mb-3"></div>
      <div class="bg-white rounded-2xl border border-teal-100 shadow-sm overflow-auto">
        <table class="w-full text-sm">
          <thead class="bg-teal-50 text-xs text-teal-800">
            <tr>
              <th class="px-4 py-3 text-right">رقم الطلب</th>
              <th class="px-4 py-3 text-right">الحالة</th>
              <th class="px-4 py-3 text-right">الاسم</th>
              <th class="px-4 py-3 text-left">المبلغ</th>
              <th class="px-4 py-3 text-right">التاريخ</th>
              <th class="px-4 py-3 text-right"></th>
            </tr>
          </thead>
          <tbody id="bb-my-order-rows"></tbody>
        </table>
      </div>
    </main>
  </body>
</html>
