<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              background: "#fff8f7",
              primary: "#146a5c",
              "primary-container": "#86d2c1",
              "surface-container-low": "#f9f2f2",
              outline: "#6f7976",
            },
          },
        },
      };
    </script>
    <style>
      body {
        font-family: "Plus Jakarta Sans", sans-serif;
      }
    </style>
    <script src="supabase-config.js"></script>
    <script src="auth.js" defer></script>
    <script src="admin-orders-app.js" defer></script>
    <title>Orders - BeebBeeb Admin</title>
  </head>
  <body class="bg-background text-slate-900 min-h-screen">
    <header
      class="bg-white/80 backdrop-blur-md border-b border-teal-50/50 sticky top-0 z-50"
    >
      <div class="max-w-[1280px] mx-auto px-6 py-3 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <span class="text-2xl font-extrabold text-primary">BeebBeeb</span>
          <span class="text-sm text-outline">Admin · Orders</span>
        </div>
        <div class="flex items-center gap-3">
          <a
            href="home.html"
            class="px-3 py-2 rounded-full text-sm text-outline hover:bg-surface-container-low transition-colors"
            >Customer site</a
          >
          <button
            data-bb-logout
            class="px-4 py-2 rounded-full bg-primary text-white font-bold hover:opacity-90 transition"
          >
            Logout
          </button>
        </div>
      </div>
    </header>

    <div class="flex">
      <aside
        class="hidden md:flex h-[calc(100vh-56px)] w-64 border-r border-slate-100 bg-white sticky top-14 flex-col gap-2 p-4"
      >
        <div class="mb-3">
          <h2 class="text-lg font-black text-primary">BeebBeeb Admin</h2>
          <p class="text-xs text-slate-500">Catalog & orders</p>
        </div>
        <nav class="space-y-1">
          <a
            class="flex items-center gap-3 p-3 text-slate-500 hover:text-primary hover:bg-slate-50 rounded-xl transition-colors"
            href="admin.html"
          >
            <span class="material-symbols-outlined">styler</span>
            <span>Products</span>
          </a>
          <a
            class="flex items-center gap-3 p-3 text-slate-500 hover:text-primary hover:bg-slate-50 rounded-xl transition-colors"
            href="inventory.html"
          >
            <span class="material-symbols-outlined">inventory_2</span>
            <span>Inventory</span>
          </a>
          <a
            class="flex items-center gap-3 p-3 bg-primary-container/30 text-primary rounded-xl font-semibold"
            href="admin-orders.html"
          >
            <span class="material-symbols-outlined">receipt_long</span>
            <span>Orders</span>
          </a>
          <a
            class="flex items-center gap-3 p-3 text-slate-500 hover:text-primary hover:bg-slate-50 rounded-xl transition-colors"
            href="admin-sales.html"
          >
            <span class="material-symbols-outlined">bar_chart</span>
            <span>Sales</span>
          </a>
          <a
            class="flex items-center gap-3 p-3 text-slate-500 hover:text-primary hover:bg-slate-50 rounded-xl transition-colors"
            href="admin-support.html"
          >
            <span class="material-symbols-outlined">support_agent</span>
            <span>Support</span>
          </a>
        </nav>
      </aside>

      <main class="flex-1 max-w-[1280px] mx-auto w-full px-6 py-6">
        <div class="flex flex-col md:flex-row md:items-end justify-between gap-4 mb-6">
          <div>
            <h1 class="text-3xl font-black">Orders</h1>
            <p class="text-sm text-outline">Recent customer orders from Supabase.</p>
          </div>
          <button
            id="bb-admin-orders-refresh"
            type="button"
            class="px-4 py-2 rounded-full border border-slate-200 bg-white hover:bg-slate-50 text-sm font-bold"
          >
            Refresh
          </button>
        </div>
        <div id="bb-admin-orders-msg" class="text-sm text-red-600 mb-3"></div>
        <div class="bg-white rounded-xl border border-slate-100 shadow-sm overflow-auto">
          <table class="w-full text-left text-sm">
            <thead class="bg-slate-50 text-xs uppercase text-slate-500">
              <tr>
                <th class="px-4 py-3">Order ID</th>
                <th class="px-4 py-3">Status</th>
                <th class="px-4 py-3">Customer</th>
                <th class="px-4 py-3">Phone</th>
                <th class="px-4 py-3">City</th>
                <th class="px-4 py-3 text-right">Total</th>
                <th class="px-4 py-3">Created</th>
                <th class="px-4 py-3">Actions</th>
              </tr>
            </thead>
            <tbody id="bb-admin-order-rows"></tbody>
          </table>
        </div>
      </main>
    </div>
  </body>
</html>
