<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>دخول الإدارة - BeebBeeb</title>
    <script src="supabase-config.js"></script>
    <script src="auth.js" defer></script>
    <style>
      body{font-family:system-ui,Segoe UI,Arial;background:#0b0f0e;max-width:520px;margin:60px auto;padding:0 16px;color:#e8e1e1}
      .card{background:#111716;border:1px solid #22302c;border-radius:18px;padding:18px}
      label{display:block;margin:10px 0 6px;font-weight:700}
      input{width:100%;padding:12px 14px;border-radius:12px;border:1px solid #2e3f3a;background:#0f1513;color:#e8e1e1}
      button{margin-top:14px;width:100%;padding:12px 14px;border-radius:12px;border:0;background:#86d2c1;color:#00201b;font-weight:900;cursor:pointer}
      button:hover{opacity:.92}
      .secondary{background:#42617d;color:#fff}
      a{color:#86d2c1}
      .note{margin:12px 0 0;font-size:12px;color:#bec9c5}
      .msg{margin-top:10px;font-size:13px;color:#ffdad6;min-height:18px}
    </style>
  </head>
  <body>
    <h2>دخول الإدارة</h2>
    <p>هذه الصفحة مخصصة لمديري المتجر فقط.</p>
    <div class="card">
      <form id="loginForm">
        <label for="email">الإيميل</label>
        <input id="email" name="email" type="email" placeholder="admin@beebbeeb.shop" required dir="ltr" />
        <label for="password">كلمة المرور</label>
        <input id="password" name="password" type="password" placeholder="••••••••" required dir="ltr" />
        <button type="submit">دخول</button>
        <button type="button" id="signupBtn" class="secondary">إنشاء حساب</button>
        <div id="loginMsg" class="msg"></div>
      </form>
      <p class="note">بعد تسجيل الدخول، سيتم التحقق من صلاحية Admin عبر `profiles.is_admin`.</p>
    </div>
    <p style="margin-top:16px"><a href="home.html">رجوع لواجهة الزبون</a></p>
  </body>
</html>
